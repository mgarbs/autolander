name: Build Desktop Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  VITE_API_URL: ${{ secrets.VITE_API_URL }}
  PUPPETEER_SKIP_DOWNLOAD: "true"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: "*.exe"
          - os: macos-latest
            platform: mac
            artifact: "*.dmg"
          - os: ubuntu-latest
            platform: linux
            artifact: "*.AppImage"

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (desktop + shared only)
        run: npm install -w packages/shared -w packages/desktop

      - name: Copy hoisted node_modules to desktop
        shell: bash
        run: |
          # npm workspaces hoists deps to root node_modules
          # electron-builder needs them in packages/desktop/node_modules
          cp -r node_modules packages/desktop/node_modules_root
          # Merge: root hoisted modules into desktop's node_modules
          if [ -d packages/desktop/node_modules ]; then
            cp -rn packages/desktop/node_modules_root/* packages/desktop/node_modules/ 2>/dev/null || true
          else
            mv packages/desktop/node_modules_root packages/desktop/node_modules
          fi
          rm -rf packages/desktop/node_modules_root
          # Ensure shared package is available
          mkdir -p packages/desktop/node_modules/@autolander
          cp -r packages/shared packages/desktop/node_modules/@autolander/shared

      - name: Download Chrome for Puppeteer
        working-directory: packages/desktop
        run: npx puppeteer browsers install chrome

      - name: Build renderer
        working-directory: packages/desktop
        run: npx vite build --config src/renderer/vite.config.js src/renderer

      - name: Build installer (${{ matrix.platform }})
        working-directory: packages/desktop
        run: npx electron-builder --${{ matrix.platform }} --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoLander-${{ matrix.platform }}
          path: packages/desktop/release/${{ matrix.artifact }}
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: artifacts/**/*
