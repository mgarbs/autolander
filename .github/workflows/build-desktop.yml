name: Build Desktop Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  VITE_API_URL: ${{ secrets.VITE_API_URL }}
  PUPPETEER_SKIP_DOWNLOAD: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: "*.exe"
          - os: macos-latest
            platform: mac
            artifact: "*.dmg"
          - os: ubuntu-latest
            platform: linux
            artifact: "*.AppImage"

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: electron-${{ runner.os }}-${{ hashFiles('packages/desktop/package.json') }}

      - name: Install desktop dependencies (non-workspace)
        shell: bash
        run: |
          # Hide root package.json so npm doesn't detect workspaces
          mv package.json package.json.bak
          mv package-lock.json package-lock.json.bak 2>/dev/null || true
          cd packages/desktop
          npm install
          cd ../..
          mv package.json.bak package.json
          mv package-lock.json.bak package-lock.json 2>/dev/null || true
          # Copy shared package into desktop node_modules
          mkdir -p packages/desktop/node_modules/@autolander
          cp -r packages/shared packages/desktop/node_modules/@autolander/shared

      - name: Build renderer
        working-directory: packages/desktop
        run: npx vite build --config src/renderer/vite.config.js src/renderer

      - name: Build installer (${{ matrix.platform }})
        working-directory: packages/desktop
        run: npx electron-builder --${{ matrix.platform }} --config electron-builder.yml --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoLander-${{ matrix.platform }}
          path: packages/desktop/release/${{ matrix.artifact }}
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: artifacts/**/*
