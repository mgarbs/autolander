appId: com.autolander.desktop
productName: AutoLander
copyright: Copyright © 2024 AutoLander
electronVersion: "28.3.3"
asar: false
directories:
  output: release
  buildResources: build
files:
  - src/main/**/*
  - src/preload/**/*
  - src/renderer/dist/**/*
  - src/worker/**/*
  - lib/**/*
  - node_modules/**/*
  - package.json
extraFiles:
  - from: ../../packages/shared
    to: resources/app/node_modules/@autolander/shared
    filter:
      - "**/*"
      - "!node_modules"
extraResources:
  - from: src/renderer/dist
    to: renderer
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: build/icon.icns
  hardenedRuntime: false
  gatekeeperAssess: false
  category: public.app-category.business
linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: build
  category: Office
publish:
  provider: github
  owner: mgarbs
  repo: autolander
