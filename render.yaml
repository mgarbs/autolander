services:
  - type: web
    name: autolander-cloud
    runtime: docker
    plan: starter
    dockerfilePath: packages/cloud/Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: autolander-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: ANTHROPIC_API_KEY
        sync: false
    healthCheckPath: /health

databases:
  - name: autolander-db
    plan: starter
    databaseName: autolander
    postgresMajorVersion: "16"
